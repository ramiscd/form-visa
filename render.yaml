services:
  # Banco de dados Postgres gratuito
  - type: managed_postgres
    name: form-visa-db
    plan: starter
    region: sao-paulo
    databaseName: back_production

  # Backend Rails
  - type: web_service
    name: form-visa-back
    env: ruby
    region: sao-paulo
    branch: main
    rootDir: back
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: form-visa-db
          property: connectionString
      - key: ASAAS_WEBHOOK_TOKEN
        value: seu_token_aqui
    autoDeploy: true
    preDeployCommand: bundle exec rails db:migrate

  # Frontend Next.js
  - type: web_service
    name: form-visa-front
    env: node
    region: sao-paulo
    branch: main
    rootDir: front
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://form-visa-back.onrender.com/api
    autoDeploy: true