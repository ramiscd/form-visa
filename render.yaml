# render.yaml - Deploy mínimo gratuito para teste

services:
  # Banco de dados Postgres gratuito
  - type: postgres
    name: form-visa-db
    plan: starter
    region: sao-paulo
    databaseName: back_production
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        value: postgres
      - key: POSTGRES_DB
        value: back_production

  # Backend Ruby on Rails
  - type: web
    name: form-visa-back
    env: ruby
    region: sao-paulo
    branch: main
    rootDir: back
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: form-visa-db
          property: connectionString
      - key: ASAAS_WEBHOOK_TOKEN
        value: teste_token
    autoDeploy: true
    preDeployCommand: bundle exec rails db:migrate

  # Frontend Next.js
  - type: web
    name: form-visa-front
    env: node
    region: sao-paulo
    branch: main
    rootDir: front
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://form-visa-back.onrender.com/api
    autoDeploy: true