databases:
  - name: form-visa-db
    plan: free

services:
  - type: web
    name: form-visa-back
    runtime: ruby
    plan: free
    rootDir: back
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: form-visa-db
          property: connectionString
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
    autoDeployTrigger: commit

  - type: web
    name: form-visa-front
    runtime: node
    plan: free
    rootDir: front
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://form-visa-back.onrender.com/api
    autoDeployTrigger: commit